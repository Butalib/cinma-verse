<div class="modal-backdrop" (click)="onBackdropClick()">
    <div class="modal-sm-md modal-card" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="modal-header">
            <h2 class="modal-title">Add New Hall</h2>
            <p class="modal-subtitle">Configure a new screening hall for this branch.</p>
        </div>

        <!-- Body -->
        <div class="hall-modal-body">
            <!-- Form Section -->
            <div class="hall-form-section">
                <div class="form-group">
                    <label>HALL NUMBER</label>
                    <input class="form-control" type="number" placeholder="e.g., 1" />
                </div>

                <div class="form-group">
                    <label>HALL TYPE</label>
                    <select class="form-control">
                        <option value="">Select type</option>
                        <option value="IMAX 4K">IMAX 4K</option>
                        <option value="DOLBY">DOLBY</option>
                        <option value="STANDARD">STANDARD</option>
                        <option value="PREMIUM">PREMIUM</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>CINEMA BRANCH</label>
                    <select class="form-control">
                        <option value="">Select branch</option>
                        <option value="BRN-001">CinemaVerse Downtown</option>
                        <option value="BRN-002">CinemaVerse Westfield</option>
                        <option value="BRN-003">CinemaVerse Nile Plaza</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>HALL STATUS</label>
                    <select class="form-control">
                        <option value="ACTIVE">Active</option>
                        <option value="MAINTENANCE">Maintenance</option>
                    </select>
                </div>
            </div>

            <!-- Map Preview Section -->
            <div class="hall-map-section">
                <div class="preview-placeholder">
                    <span>●</span>
                    <span>PREVIEW AVAILABLE AFTER SAVE</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button class="btn btn-ghost btn-md" type="button" (click)="onCancel()">Cancel</button>
            <button class="btn btn-primary btn-md" type="button" (click)="onSubmit()">
                <span class="material-symbols-outlined" style="font-size: 16px;">add</span>
                Add Hall
            </button>
        </div>
    </div>
</div>
